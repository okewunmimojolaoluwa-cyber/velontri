global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:8000"]

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:8000"]

  - job_name: "marketplace-service"
    static_configs:
      - targets: ["marketplace-service:8000"]

  - job_name: "search-service"
    static_configs:
      - targets: ["search-service:8000"]

  - job_name: "ai-service"
    static_configs:
      - targets: ["ai-service:8000"]

  - job_name: "chat-service"
    static_configs:
      - targets: ["chat-service:8000"]

  - job_name: "payment-service"
    static_configs:
      - targets: ["payment-service:8000"]

  - job_name: "wallet-service"
    static_configs:
      - targets: ["wallet-service:8000"]

  - job_name: "inventory-service"
    static_configs:
      - targets: ["inventory-service:8000"]

  - job_name: "logistics-service"
    static_configs:
      - targets: ["logistics-service:8000"]

  - job_name: "analytics-service"
    static_configs:
      - targets: ["analytics-service:8000"]

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:8000"]

  - job_name: "crm-service"
    static_configs:
      - targets: ["crm-service:8000"]

  - job_name: "subscription-service"
    static_configs:
      - targets: ["subscription-service:8000"]
