# Velontri — Kubernetes Horizontal Pod Autoscaler manifests
# minReplicas: 2, maxReplicas: 20, targetCPUUtilizationPercentage: 70
# As per spec requirement 23.5

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: velontri
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
