##############################################################################
# Velontri — Local Development API Gateway (single port 8000)
# Proxies all 14 microservices. No SSL. CORS handled by upstream services.
##############################################################################

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile          on;
    keepalive_timeout 75s;
    client_max_body_size 100m;

    gzip            on;
    gzip_types      application/json text/plain text/css application/javascript;

    upstream auth_service         { server auth-service:8000; }
    upstream user_service         { server user-service:8000; }
    upstream marketplace_service  { server marketplace-service:8000; }
    upstream search_service       { server search-service:8000; }
    upstream ai_service           { server ai-service:8000; }
    upstream chat_service         { server chat-service:8000; }
    upstream payment_service      { server payment-service:8000; }
    upstream wallet_service       { server wallet-service:8000; }
    upstream inventory_service    { server inventory-service:8000; }
    upstream logistics_service    { server logistics-service:8000; }
    upstream analytics_service    { server analytics-service:8000; }
    upstream notification_service { server notification-service:8000; }
    upstream crm_service          { server crm-service:8000; }
    upstream subscription_service { server subscription-service:8000; }

    server {
        listen 80;
        server_name localhost;

        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # ── Gateway meta ────────────────────────────────────────────────────
        location = /health {
            default_type application/json;
            return 200 '{"service":"velontri-api-gateway","status":"ok","port":8000}';
        }

        location = /api/v1 {
            default_type application/json;
            return 200 '{"service":"velontri-api-gateway","base_url":"/api/v1","docs":"/docs"}';
        }

        # ── Swagger (auth service docs as unified entry) ────────────────────
        location /docs {
            proxy_pass http://auth_service/docs;
        }
        location /openapi.json {
            proxy_pass http://auth_service/openapi.json;
        }
        location /redoc {
            proxy_pass http://auth_service/redoc;
        }

        # ── Service routes ──────────────────────────────────────────────────
        location /api/v1/auth/ {
            proxy_pass http://auth_service;
        }

        location ~ ^/api/v1/(users|businesses) {
            proxy_pass http://user_service;
        }

        location ~ ^/api/v1/(listings|bookings|stores|reviews|applications) {
            client_max_body_size 100m;
            proxy_read_timeout 120s;
            proxy_pass http://marketplace_service;
        }

        location /api/v1/search {
            proxy_pass http://search_service;
        }

        location /api/v1/ai/ {
            proxy_read_timeout 120s;
            proxy_pass http://ai_service;
        }

        location /api/v1/ws/ {
            proxy_pass http://chat_service;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/v1/chat/ {
            client_max_body_size 25m;
            proxy_pass http://chat_service;
        }

        location ~ ^/api/v1/(payments|disputes) {
            proxy_pass http://payment_service;
        }

        location /api/v1/wallet/ {
            proxy_pass http://wallet_service;
        }

        location /api/v1/inventory/ {
            proxy_pass http://inventory_service;
        }

        location /api/v1/logistics/ {
            proxy_pass http://logistics_service;
        }

        location /api/v1/analytics/ {
            proxy_pass http://analytics_service;
        }

        location /api/v1/notifications/ {
            proxy_pass http://notification_service;
        }

        location /api/v1/crm/ {
            proxy_pass http://crm_service;
        }

        location /api/v1/subscriptions/ {
            proxy_pass http://subscription_service;
        }

        location / {
            default_type application/json;
            return 404 '{"success":false,"error":{"code":"NOT_FOUND","message":"Endpoint not found"}}';
        }
    }
}
