##############################################################################
# Velontri Production Nginx Configuration
# Reverse proxy to 14 FastAPI microservices
# SSL termination, rate limiting, gzip, CORS, WebSocket support
##############################################################################

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":"$status",'
        '"bytes_sent":"$bytes_sent",'
        '"request_time":"$request_time",'
        '"upstream_response_time":"$upstream_response_time",'
        '"request_id":"$http_x_request_id",'
        '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Basic Settings ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    types_hash_max_size 2048;
    server_tokens      off;
    client_max_body_size 100m;  # Allow large file uploads (videos)

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:20m     rate=300r/m;
    limit_req_zone $binary_remote_addr zone=search_limit:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m  rate=20r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Request ID ────────────────────────────────────────────────────────────
    map $http_x_request_id $request_id_final {
        ""      $request_id;
        default $http_x_request_id;
    }

    # ── Upstream Definitions ──────────────────────────────────────────────────
    upstream auth_service        { server auth-service:8001;         keepalive 32; }
    upstream user_service        { server user-service:8002;         keepalive 32; }
    upstream marketplace_service { server marketplace-service:8003;  keepalive 32; }
    upstream search_service      { server search-service:8004;       keepalive 32; }
    upstream ai_service          { server ai-service:8005;           keepalive 32; }
    upstream chat_service        { server chat-service:8006;         keepalive 32; }
    upstream payment_service     { server payment-service:8007;      keepalive 32; }
    upstream wallet_service      { server wallet-service:8008;       keepalive 32; }
    upstream inventory_service   { server inventory-service:8009;    keepalive 32; }
    upstream logistics_service   { server logistics-service:8010;    keepalive 32; }
    upstream analytics_service   { server analytics-service:8011;    keepalive 32; }
    upstream notification_service { server notification-service:8012; keepalive 32; }
    upstream crm_service         { server crm-service:8013;          keepalive 32; }
    upstream subscription_service { server subscription-service:8014; keepalive 32; }

    # ── Redirect HTTP → HTTPS ────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.velontri.com;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.velontri.com;

        # ── SSL Configuration ────────────────────────────────────────────────
        ssl_certificate     /etc/ssl/velontri/fullchain.pem;
        ssl_certificate_key /etc/ssl/velontri/privkey.pem;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS (1 year, include subdomains)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Security Headers ─────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Request-ID $request_id_final always;

        # ── CORS headers (handled per-location or globally) ──────────────────
        set $cors_origin "";
        if ($http_origin ~* "^https://(app|admin|partner)\.velontri\.com$") {
            set $cors_origin $http_origin;
        }

        # ── Proxy common settings ────────────────────────────────────────────
        proxy_http_version  1.1;
        proxy_set_header    Host             $host;
        proxy_set_header    X-Real-IP        $remote_addr;
        proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_set_header    X-Request-ID     $request_id_final;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         8 16k;

        # ── Health ────────────────────────────────────────────────────────────
        location = /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Auth Service ──────────────────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://auth_service;
        }

        # ── User / Business ───────────────────────────────────────────────────
        location ~ ^/api/v1/(users|businesses) {
            limit_req zone=api_limit burst=50 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://user_service;
        }

        # ── Marketplace ───────────────────────────────────────────────────────
        location ~ ^/api/v1/(listings|bookings|stores|reviews|applications) {
            limit_req zone=api_limit burst=50 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }

            # Larger timeout for image/video uploads
            proxy_read_timeout 120s;
            client_max_body_size 100m;
            proxy_pass http://marketplace_service;
        }

        # ── Search ────────────────────────────────────────────────────────────
        location /api/v1/search {
            limit_req zone=search_limit burst=30 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://search_service;
        }

        # ── AI ────────────────────────────────────────────────────────────────
        location /api/v1/ai/ {
            limit_req zone=api_limit burst=20 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_read_timeout 120s;
            proxy_pass http://ai_service;
        }

        # ── Chat WebSocket ────────────────────────────────────────────────────
        location /api/v1/ws/ {
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;   # WS connections are long-lived
            proxy_send_timeout 3600s;
        }

        # ── Chat REST ─────────────────────────────────────────────────────────
        location /api/v1/chat/ {
            limit_req zone=api_limit burst=50 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            client_max_body_size 20m;
            proxy_pass http://chat_service;
        }

        # ── Payment ───────────────────────────────────────────────────────────
        location ~ ^/api/v1/(payments|disputes) {
            limit_req zone=api_limit burst=30 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-Signature, verif-hash, x-paystack-signature" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://payment_service;
        }

        # ── Wallet ────────────────────────────────────────────────────────────
        location /api/v1/wallet/ {
            limit_req zone=api_limit burst=30 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://wallet_service;
        }

        # ── Inventory ─────────────────────────────────────────────────────────
        location /api/v1/inventory/ {
            limit_req zone=api_limit burst=30 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://inventory_service;
        }

        # ── Logistics ─────────────────────────────────────────────────────────
        location /api/v1/logistics/ {
            limit_req zone=api_limit burst=30 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://logistics_service;
        }

        # ── Analytics ─────────────────────────────────────────────────────────
        location /api/v1/analytics/ {
            limit_req zone=api_limit burst=30 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://analytics_service;
        }

        # ── Notifications ─────────────────────────────────────────────────────
        location /api/v1/notifications/ {
            limit_req zone=api_limit burst=30 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://notification_service;
        }

        # ── CRM ───────────────────────────────────────────────────────────────
        location /api/v1/crm/ {
            limit_req zone=api_limit burst=30 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://crm_service;
        }

        # ── Subscriptions ─────────────────────────────────────────────────────
        location /api/v1/subscriptions/ {
            limit_req zone=api_limit burst=30 nodelay;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://subscription_service;
        }

        # ── Catch-all 404 ─────────────────────────────────────────────────────
        location / {
            return 404 '{"success":false,"error":{"code":"NOT_FOUND","message":"Endpoint not found","field":null}}';
            add_header Content-Type application/json;
        }
    }
}
